name: Pipeline de Testes Mobile - EBAC

# O fluxo será disparado automaticamente a cada push ou pull request na branch ci
on:
  push:
    branches: [ "ci" ]
  pull_request:
    branches: [ "ci" ]

jobs:
  executar-testes:
    runs-on: ubuntu-latest # Máquina virtual Linux fornecida pelo GitHub

    steps:
      - name: Passo 1 - Clonar o Repositório
        uses: actions/checkout@v3

      - name: Passo 2 - Configurar o Ambiente Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Passo 3 - Instalar Dependências do Projeto
        run: npm install

      - name: Passo 3.5 - Corrigir Permissão de Execução do WDIO
        run: chmod +x ./node_modules/.bin/wdio

      - name: Passo 4 - Executar Testes Mobile no BrowserStack
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: npm run test:ci