name: Pipeline de Testes Mobile - EBAC

on:
  push:
    branches: [ "ci" ]
  pull_request:
    branches: [ "ci" ]

jobs:
  executar-testes:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Clonar o Repositório
        uses: actions/checkout@v3

      - name: Passo 2 - Configurar o Ambiente Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Passo 3 - Instalar Dependências do Projeto
        run: npm install

      # CORREÇÃO AQUI: Garante permissão para a pasta inteira de binários do Node
      - name: Passo 3.5 - Forçar Permissões de Execução
        run: |
          chmod -R +x ./node_modules/.bin/
          sudo chmod -R +x /home/runner/.npm/

      - name: Passo 4 - Executar Testes Mobile no BrowserStack
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: npm run test:ci